name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: CI
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          docker-images: true
          large-packages: false
          swap-storage: false

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: ci
          repository-cache: true

      # --- Lint ---
      - name: Lint and lockfile check
        run: |
          bazelisk run //:fix_lint
          git diff --exit-code

      # --- Unit tests ---
      - name: Build tests
        run: bazelisk build ... --build_tests_only --profile=build.profile
      - name: Analyze build
        if: always()
        run: bazelisk analyze-profile build.profile

      - name: Run tests
        run: bazelisk test ... --keep_going --build_tests_only --test_output=errors --profile=test.profile
      - name: Analyze test
        if: always()
        run: bazelisk analyze-profile test.profile

      # --- ORFS integration ---
      - name: ORFS integration lint tests
        working-directory: orfs
        run: bazelisk test //:asap7_lint_tests --keep_going --test_output=errors

      - name: ORFS mock flow (gcd)
        working-directory: orfs
        run: bazelisk build @orfs//flow/designs/asap7/gcd:gcd_generate_metadata

      # --- Deps integration ---
      - name: Deps integration tests
        run: test/deps_integration_test.sh all

      # --- Gallery ---
      - name: Gallery query
        working-directory: gallery
        run: bazelisk query //...

      - name: Gallery tests
        working-directory: gallery
        run: bazelisk test ... --keep_going --build_tests_only --test_output=errors --profile=gallery.profile
      - name: Analyze gallery
        if: always()
        working-directory: gallery
        run: bazelisk analyze-profile gallery.profile

      # --- Submodules ---
      - name: "Submodule: mock/chisel build"
        working-directory: mock/chisel
        run: >-
          bazelisk build ... --keep_going
          --override_module=bazel-orfs=${{ github.workspace }}
          --profile=mock-chisel.profile
      - name: "Submodule: chisel test"
        working-directory: chisel
        run: >-
          bazelisk test ... --keep_going --build_tests_only --test_output=errors
          --override_module=bazel-orfs=${{ github.workspace }}
          --profile=chisel.profile
      - name: "Submodule: sby test"
        working-directory: sby
        run: >-
          bazelisk test ... --keep_going --build_tests_only --test_output=errors
          --override_module=bazel-orfs=${{ github.workspace }}
          --profile=sby.profile
      - name: "Submodule: lec build"
        working-directory: lec
        run: >-
          bazelisk build ... --keep_going
          --profile=lec.profile
