name: bazel-orfs

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
    env:
      DEBIAN_FRONTEND: "noninteractive"
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          docker-images: true
          large-packages: false
          swap-storage: false
      - name: Checkout bazel-orfs
        uses: actions/checkout@v4

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Launch Bazel
        run: bazelisk build --nobuild ... --build_tests_only --profile=launch.profile
      - name: Analyze launch
        if: always()
        run: bazelisk analyze-profile launch.profile

      - name: Build tests
        run: bazelisk build ... --build_tests_only --profile=build.profile
      - name: Analyze build
        if: always()
        run: bazelisk analyze-profile build.profile

      - name: Run tests
        run: bazelisk test ... --keep_going --build_tests_only --test_output=errors --profile=test.profile
      - name: Analyze test
        if: always()
        run: bazelisk analyze-profile test.profile

      - name: Verify cache
        run: |
          # A second build should be a no-op if caching works.
          # "0 processes" means everything came from cache.
          OUTPUT=$(bazelisk build ... --build_tests_only 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "0 processes" || { echo "ERROR: expected all actions cached"; exit 1; }
