title: "Proposed: Python generates Make (like defaults.py)"
layout:
  node_width: 220
  node_height: 48
  gap_y: 30
  margin: 30

nodes:
  - id: configpy
    label: "config.py"
    sublabel: "source of truth, unit-testable"
    col: 1
    row: 0
    fill: "#e8f5e9"
    stroke: "#2e7d32"
    stroke_width: 2.5

  - id: configmk
    label: "config.mk (shim)"
    sublabel: "$(shell python config.py) | $(eval)"
    col: 0
    row: 1
    fill: "#fff3e0"
    stroke: "#e65100"

  - id: make
    label: "GNU Make"
    sublabel: "Makefile + variables.mk (unchanged)"
    col: 0
    row: 2
    fill: "#fff3e0"
    stroke: "#e65100"

  - id: tools_make
    label: "openroad / yosys / klayout"
    sublabel: "via flow.sh (Make path)"
    col: 0
    row: 3
    fill: "#f5f5f5"
    stroke: "#666"

  - id: bazel
    label: "bazel-orfs"
    sublabel: "calls config.py --format=json"
    col: 2
    row: 1
    fill: "#e3f2fd"
    stroke: "#1565c0"
    stroke_width: 2.5

  - id: tools_bazel
    label: "openroad / yosys / klayout"
    sublabel: "direct invocation (no Make)"
    col: 2
    row: 2
    fill: "#e3f2fd"
    stroke: "#1565c0"

edges:
  - from: configpy
    to: configmk
    label: "stdout: Make code"

  - from: configpy
    to: bazel
    label: "--format=json"
    color: "#1565c0"

  - from: configmk
    to: make

  - from: make
    to: tools_make

  - from: bazel
    to: tools_bazel
    color: "#1565c0"
